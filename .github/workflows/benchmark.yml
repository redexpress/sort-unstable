name: Benchmark

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Test
        run: mvn -B test

      - name: Run JMH benchmark
        run: mvn -B test-compile -Pbenchmark exec:exec | tee benchmark.txt

      - name: Upload benchmark result
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-result
          path: benchmark.txt
